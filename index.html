<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Avatar Destello Multi-Device</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: #f0f2f5; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; padding: 10px; 
            touch-action: none; /* Chặn cuộn trang để trải nghiệm zoom mượt hơn */
            box-sizing: border-box; 
            overflow: hidden; /* Ẩn thanh cuộn thừa */
        }

        .container { 
            width: 100%; max-width: 500px; 
            display: flex; flex-direction: column; align-items: center; gap: 12px; 
            position: relative; z-index: 1;
        }
        
        /* HEADER */
        .header-section { text-align: center; margin-bottom: 5px; }
        .header-title { color: #003366; font-size: 20px; font-weight: 800; text-transform: uppercase; margin: 0; line-height: 1.2; }
        .header-subtitle { color: #b88b4a; font-size: 12px; font-weight: 600; margin-top: 5px; text-transform: uppercase; }

        .canvas-wrapper {
            box-shadow: 0 15px 35px rgba(0,0,0,0.15); 
            border-radius: 16px; 
            overflow: hidden; 
            background: #fff;
            /* Nền caro */
            background-image: linear-gradient(45deg, #eee 25%, transparent 25%), linear-gradient(-45deg, #eee 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #eee 75%), linear-gradient(-45deg, transparent 75%, #eee 75%);
            background-size: 20px 20px;
            display: flex; justify-content: center; align-items: center;
        }

        .upload-label {
            background-color: #fff; color: #333; padding: 12px 20px; border-radius: 50px;
            font-weight: 700; cursor: pointer; border: 1px solid #e1e1e1; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; width: 90%; transition: 0.2s;
        }
        .upload-label:active { transform: scale(0.98); background-color: #f5f5f5; }
        #avatarInput { display: none; }
        
        .download-btn {
            background: linear-gradient(135deg, #004e92, #000428); color: white; padding: 16px; border-radius: 50px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; box-shadow: 0 6px 20px rgba(0, 78, 146, 0.4); transition: 0.2s;
        }
        .download-btn:active { transform: scale(0.96); }
        .tip { font-size: 11px; color: #888; margin-top: 8px; text-align: center; font-style: italic; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-section">
            <h1 class="header-title">Avatar Tháp Eleva</h1>
            <div class="header-subtitle">Khẳng định đẳng cấp vươn tầm sống sang</div>
        </div>

        <label for="avatarInput" class="upload-label">

                    img.scale(scaleAvt);
                    canvas.centerObject(img); 
                    
                    // Tắt hết nút điều khiển để dùng Zoom chuột/tay
                    img.hasControls = false; 
                    img.hasBorders = false;

                    canvas.add(img);
                    canvas.setActiveObject(img);
                    
                    img.sendToBack(); 
                    if(frameObject) frameObject.bringToFront();
                    
                    canvas.requestRenderAll();
                });
            };
            reader.readAsDataURL(file);
        });

        // --- 4. TÍNH NĂNG ZOOM CHO PC (MOUSE WHEEL) ---
        canvas.on('mouse:wheel', function(opt) {
            var delta = opt.e.deltaY;
            var activeObj = canvas.getActiveObject();
            
            // Chỉ zoom khi đã có avatar
            if(activeObj) {
                var zoom = activeObj.scaleX;
                
                // Thuật toán zoom mượt
                zoom *= 0.999 ** delta;
                
                // Giới hạn zoom (Min: 0.1, Max: 5 lần)
                if (zoom > 5) zoom = 5;
                if (zoom < 0.1) zoom = 0.1;
                
                activeObj.scale(zoom);
                canvas.requestRenderAll();
            }
            
            // Chặn cuộn trang web khi đang lăn chuột trong canvas
            opt.e.preventDefault();
            opt.e.stopPropagation();
        });

        // --- 5. TÍNH NĂNG ZOOM CHO MOBILE (PINCH) ---
        let initialDistance = 0, initialScale = 1;
        function getDistance(t1, t2) { return Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY); }
        const cv = document.querySelector('.canvas-wrapper');
        
        cv.addEventListener('touchstart', function(e) {
            if (e.touches.length === 2) {
                initialDistance = getDistance(e.touches[0], e.touches[1]);
                const activeObj = canvas.getActiveObject();
                if (activeObj) initialScale = activeObj.scaleX;
            }
        });

        cv.addEventListener('touchmove', function(e) {
            if (e.touches.length === 2) {
                e.preventDefault(); 
                const currentDistance = getDistance(e.touches[0], e.touches[1]);
                if (initialDistance > 0) {
                    const scaleMultiplier = currentDistance / initialDistance;
                    const activeObj = canvas.getActiveObject();
                    if (activeObj) {
                        let newScale = initialScale * scaleMultiplier;
                        newScale = Math.max(0.1, Math.min(newScale, 5)); 
                        activeObj.scale(newScale);
                        canvas.requestRenderAll();
                    }
                }
            }
        }, { passive: false });

        function downloadImage() {
            if(canvas.getObjects().length <= 1) { alert("Chọn ảnh đã bồ ơi!"); return; }
            const link = document.createElement('a');
            link.download = 'avatar_destello.png';
            link.href = canvas.toDataURL({ format: 'png', quality: 1, multiplier: 4 });
            link.click();
        }
    </script>
</body>
</html>
